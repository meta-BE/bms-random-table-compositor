name: POC Build Windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: poc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Frontend install
        shell: pwsh
        working-directory: poc/frontend
        run: npm install

      - name: Wails build (windows/amd64)
        shell: pwsh
        run: wails build -platform windows/amd64

      # Wails は Windows ビルド時に exe 名としてプロジェクトディレクトリ名 (poc) を使うため、
      # 配布名 bms-rtc-poc.exe にリネームしてから artifact 化する
      - name: Rename exe
        shell: pwsh
        run: Rename-Item -Path build/bin/poc.exe -NewName bms-rtc-poc.exe

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: poc-windows-amd64
          path: poc/build/bin/bms-rtc-poc.exe
          if-no-files-found: error
          retention-days: 14
